<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @keyframes fall1 { 0% { transform: translateY(-50px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }
      @keyframes fall2 { 0% { transform: translateY(-80px); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(200px); opacity: 0; } }
      @keyframes fall3 { 0% { transform: translateY(-30px); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(200px); opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes slideText { 0% { opacity: 0; transform: translateX(-20px); } 20% { opacity: 1; transform: translateX(0); } 80% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(20px); } }

      .drop-1 { font-family: 'Courier New', monospace; font-size: 13px; fill: #63B3ED; animation: fall1 4s linear infinite; opacity: 0; }
      .drop-2 { font-family: 'Courier New', monospace; font-size: 13px; fill: #7dcfff; animation: fall2 3.5s linear infinite; opacity: 0; }
      .drop-3 { font-family: 'Courier New', monospace; font-size: 13px; fill: #9f7aea; animation: fall3 4.5s linear infinite; opacity: 0; }
      .glow-pulse { animation: pulse 2s ease-in-out infinite; }

      /* Matrix characters */
      .mc { font-family: 'Courier New', monospace; font-size: 12px; }
      .mc-c0 { fill: #63B3ED; }
      .mc-c1 { fill: #7dcfff; }
      .mc-c2 { fill: #bb9af7; }
      .mc-c3 { fill: #9f7aea; }
      .mc-c4 { fill: #f7768e; }
      .mc-c5 { fill: #ff9ecd; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0d0d1a"/>

  <!-- Background grid -->
  <rect width="800" height="200" fill="none" stroke="#1a1b26" stroke-width="1"/>
  <line x1="0" y1="50" x2="800" y2="50" stroke="#1a1b26" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#1a1b26" stroke-width="0.5"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1a1b26" stroke-width="0.5"/>

  <!-- Matrix rain columns -->
  <g class="glow-pulse">
    <!-- Column 1 -->
    <text x="15" y="0" class="drop-1 mc mc-c0" style="animation-delay: 0s;">1</text>
    <text x="15" y="0" class="drop-2 mc mc-c1" style="animation-delay: 0.5s;">0</text>
    <text x="15" y="0" class="drop-3 mc mc-c2" style="animation-delay: 1s;">1</text>
    <text x="15" y="0" class="drop-1 mc mc-c3" style="animation-delay: 1.5s;">1</text>

    <!-- Column 2 -->
    <text x="50" y="0" class="drop-2 mc mc-c1" style="animation-delay: 0.3s;">0</text>
    <text x="50" y="0" class="drop-3 mc mc-c2" style="animation-delay: 0.8s;">1</text>
    <text x="50" y="0" class="drop-1 mc mc-c4" style="animation-delay: 1.3s;">0</text>
    <text x="50" y="0" class="drop-2 mc mc-c5" style="animation-delay: 1.8s;">1</text>

    <!-- Column 3 -->
    <text x="85" y="0" class="drop-3 mc mc-c2" style="animation-delay: 0.1s;">1</text>
    <text x="85" y="0" class="drop-1 mc mc-c0" style="animation-delay: 0.6s;">0</text>
    <text x="85" y="0" class="drop-2 mc mc-c1" style="animation-delay: 1.1s;">0</text>
    <text x="85" y="0" class="drop-3 mc mc-c3" style="animation-delay: 1.6s;">1</text>

    <!-- Column 4 -->
    <text x="120" y="0" class="drop-1 mc mc-c3" style="animation-delay: 0.4s;">1</text>
    <text x="120" y="0" class="drop-3 mc mc-c4" style="animation-delay: 0.9s;">0</text>
    <text x="120" y="0" class="drop-2 mc mc-c0" style="animation-delay: 1.4s;">1</text>
    <text x="120" y="0" class="drop-1 mc mc-c2" style="animation-delay: 1.9s;">0</text>

    <!-- Column 5 -->
    <text x="155" y="0" class="drop-2 mc mc-c5" style="animation-delay: 0.2s;">0</text>
    <text x="155" y="0" class="drop-1 mc mc-c1" style="animation-delay: 0.7s;">1</text>
    <text x="155" y="0" class="drop-3 mc mc-c3" style="animation-delay: 1.2s;">1</text>
    <text x="155" y="0" class="drop-2 mc mc-c0" style="animation-delay: 1.7s;">0</text>

    <!-- Column 6 -->
    <text x="190" y="0" class="drop-3 mc mc-c4" style="animation-delay: 0.5s;">0</text>
    <text x="190" y="0" class="drop-2 mc mc-c2" style="animation-delay: 1s;">1</text>
    <text x="190" y="0" class="drop-1 mc mc-c5" style="animation-delay: 1.5s;">0</text>
    <text x="190" y="0" class="drop-3 mc mc-c1" style="animation-delay: 2s;">1</text>

    <!-- Column 7 -->
    <text x="225" y="0" class="drop-1 mc mc-c0" style="animation-delay: 0.35s;">1</text>
    <text x="225" y="0" class="drop-2 mc mc-c3" style="animation-delay: 0.85s;">0</text>
    <text x="225" y="0" class="drop-3 mc mc-c4" style="animation-delay: 1.35s;">1</text>
    <text x="225" y="0" class="drop-1 mc mc-c2" style="animation-delay: 1.85s;">1</text>

    <!-- Column 8 -->
    <text x="260" y="0" class="drop-2 mc mc-c1" style="animation-delay: 0.15s;">0</text>
    <text x="260" y="0" class="drop-3 mc mc-c5" style="animation-delay: 0.65s;">1</text>
    <text x="260" y="0" class="drop-1 mc mc-c0" style="animation-delay: 1.15s;">0</text>
    <text x="260" y="0" class="drop-2 mc mc-c3" style="animation-delay: 1.65s;">1</text>

    <!-- Column 9 -->
    <text x="295" y="0" class="drop-3 mc mc-c2" style="animation-delay: 0.45s;">1</text>
    <text x="295" y="0" class="drop-1 mc mc-c4" style="animation-delay: 0.95s;">1</text>
    <text x="295" y="0" class="drop-2 mc mc-c1" style="animation-delay: 1.45s;">0</text>
    <text x="295" y="0" class="drop-3 mc mc-c5" style="animation-delay: 1.95s;">0</text>

    <!-- Column 10 -->
    <text x="330" y="0" class="drop-1 mc mc-c3" style="animation-delay: 0.25s;">1</text>
    <text x="330" y="0" class="drop-2 mc mc-c0" style="animation-delay: 0.75s;">0</text>
    <text x="330" y="0" class="drop-3 mc mc-c2" style="animation-delay: 1.25s;">1</text>
    <text x="330" y="0" class="drop-1 mc mc-c4" style="animation-delay: 1.75s;">1</text>

    <!-- Column 11 -->
    <text x="365" y="0" class="drop-2 mc mc-c5" style="animation-delay: 0.55s;">0</text>
    <text x="365" y="0" class="drop-3 mc mc-c1" style="animation-delay: 1.05s;">1</text>
    <text x="365" y="0" class="drop-1 mc mc-c3" style="animation-delay: 1.55s;">0</text>
    <text x="365" y="0" class="drop-2 mc mc-c0" style="animation-delay: 2.05s;">1</text>

    <!-- Column 12 -->
    <text x="400" y="0" class="drop-3 mc mc-c4" style="animation-delay: 0.1s;">0</text>
    <text x="400" y="0" class="drop-1 mc mc-c2" style="animation-delay: 0.6s;">1</text>
    <text x="400" y="0" class="drop-2 mc mc-c5" style="animation-delay: 1.1s;">0</text>
    <text x="400" y="0" class="drop-3 mc mc-c1" style="animation-delay: 1.6s;">1</text>

    <!-- Column 13 -->
    <text x="435" y="0" class="drop-1 mc mc-c0" style="animation-delay: 0.3s;">1</text>
    <text x="435" y="0" class="drop-2 mc mc-c3" style="animation-delay: 0.8s;">0</text>
    <text x="435" y="0" class="drop-3 mc mc-c4" style="animation-delay: 1.3s;">1</text>
    <text x="435" y="0" class="drop-1 mc mc-c2" style="animation-delay: 1.8s;">0</text>

    <!-- Column 14 -->
    <text x="470" y="0" class="drop-2 mc mc-c1" style="animation-delay: 0.2s;">0</text>
    <text x="470" y="0" class="drop-3 mc mc-c5" style="animation-delay: 0.7s;">1</text>
    <text x="470" y="0" class="drop-1 mc mc-c0" style="animation-delay: 1.2s;">1</text>
    <text x="470" y="0" class="drop-2 mc mc-c3" style="animation-delay: 1.7s;">0</text>

    <!-- Column 15 -->
    <text x="505" y="0" class="drop-3 mc mc-c2" style="animation-delay: 0.4s;">1</text>
    <text x="505" y="0" class="drop-1 mc mc-c4" style="animation-delay: 0.9s;">0</text>
    <text x="505" y="0" class="drop-2 mc mc-c1" style="animation-delay: 1.4s;">1</text>
    <text x="505" y="0" class="drop-3 mc mc-c5" style="animation-delay: 1.9s;">1</text>

    <!-- Column 16 -->
    <text x="540" y="0" class="drop-1 mc mc-c3" style="animation-delay: 0.1s;">0</text>
    <text x="540" y="0" class="drop-2 mc mc-c0" style="animation-delay: 0.6s;">1</text>
    <text x="540" y="0" class="drop-3 mc mc-c2" style="animation-delay: 1.1s;">0</text>
    <text x="540" y="0" class="drop-1 mc mc-c4" style="animation-delay: 1.6s;">1</text>

    <!-- Column 17 -->
    <text x="575" y="0" class="drop-2 mc mc-c5" style="animation-delay: 0.35s;">1</text>
    <text x="575" y="0" class="drop-3 mc mc-c1" style="animation-delay: 0.85s;">0</text>
    <text x="575" y="0" class="drop-1 mc mc-c3" style="animation-delay: 1.35s;">1</text>
    <text x="575" y="0" class="drop-2 mc mc-c0" style="animation-delay: 1.85s;">0</text>

    <!-- Column 18 -->
    <text x="610" y="0" class="drop-3 mc mc-c4" style="animation-delay: 0.15s;">0</text>
    <text x="610" y="0" class="drop-1 mc mc-c2" style="animation-delay: 0.65s;">1</text>
    <text x="610" y="0" class="drop-2 mc mc-c5" style="animation-delay: 1.15s;">0</text>
    <text x="610" y="0" class="drop-3 mc mc-c1" style="animation-delay: 1.65s;">1</text>

    <!-- Column 19 -->
    <text x="645" y="0" class="drop-1 mc mc-c0" style="animation-delay: 0.45s;">1</text>
    <text x="645" y="0" class="drop-2 mc mc-c3" style="animation-delay: 0.95s;">0</text>
    <text x="645" y="0" class="drop-3 mc mc-c4" style="animation-delay: 1.45s;">1</text>
    <text x="645" y="0" class="drop-1 mc mc-c2" style="animation-delay: 1.95s;">1</text>

    <!-- Column 20 -->
    <text x="680" y="0" class="drop-2 mc mc-c1" style="animation-delay: 0.25s;">0</text>
    <text x="680" y="0" class="drop-3 mc mc-c5" style="animation-delay: 0.75s;">1</text>
    <text x="680" y="0" class="drop-1 mc mc-c0" style="animation-delay: 1.25s;">0</text>
    <text x="680" y="0" class="drop-2 mc mc-c3" style="animation-delay: 1.75s;">1</text>

    <!-- Column 21 -->
    <text x="715" y="0" class="drop-3 mc mc-c2" style="animation-delay: 0.05s;">1</text>
    <text x="715" y="0" class="drop-1 mc mc-c4" style="animation-delay: 0.55s;">0</text>
    <text x="715" y="0" class="drop-2 mc mc-c1" style="animation-delay: 1.05s;">1</text>
    <text x="715" y="0" class="drop-3 mc mc-c5" style="animation-delay: 1.55s;">0</text>

    <!-- Column 22 -->
    <text x="750" y="0" class="drop-1 mc mc-c3" style="animation-delay: 0.3s;">1</text>
    <text x="750" y="0" class="drop-2 mc mc-c0" style="animation-delay: 0.8s;">0</text>
    <text x="750" y="0" class="drop-3 mc mc-c2" style="animation-delay: 1.3s;">1</text>
    <text x="750" y="0" class="drop-1 mc mc-c4" style="animation-delay: 1.8s;">0</text>

    <!-- Column 23 -->
    <text x="785" y="0" class="drop-2 mc mc-c5" style="animation-delay: 0.5s;">1</text>
    <text x="785" y="0" class="drop-3 mc mc-c1" style="animation-delay: 1s;">0</text>
    <text x="785" y="0" class="drop-1 mc mc-c3" style="animation-delay: 1.5s;">1</text>
    <text x="785" y="0" class="drop-2 mc mc-c0" style="animation-delay: 2s;">1</text>
  </g>

  <!-- Main title -->
  <text x="400" y="85" text-anchor="middle" font-family="Courier New" font-size="20" font-weight="bold" fill="#7dcfff" filter="url(#glow)">S Y S T E M . E N T E R E D</text>
  <text x="400" y="105" text-anchor="middle" font-family="Courier New" font-size="12" fill="#bb9af7">// ENTER THE DIGITAL REALM //</text>

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Divider -->
  <line x1="50" y1="120" x2="750" y2="120" stroke="#63B3ED" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="400" y="140" text-anchor="middle" font-family="Courier New" font-size="11" fill="#565f89">BUILDING THE FUTURE ONE COMMIT AT A TIME</text>

  <!-- Footer -->
  <text x="400" y="165" text-anchor="middle" font-family="Courier New" font-size="10" fill="#2D3748">SKYDRAGO-DEV // ALL SYSTEMS GO //</text>

  <!-- Border -->
  <rect x="5" y="5" width="790" height="190" fill="none" stroke="#63B3ED" stroke-width="1.5" opacity="0.3" rx="4"/>
</svg>
