<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <style>
      @keyframes slideRight {
        0% { transform: translateX(-120px); }
        100% { transform: translateX(880px); }
      }
      @keyframes slideLeft {
        0% { transform: translateX(880px); }
        100% { transform: translateX(-120px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 8px #63B3ED); }
        50% { filter: drop-shadow(0 0 20px #7dcfff); }
      }
      @keyframes tongueFlick {
        0%, 80%, 100% { transform: scaleX(1); }
        90% { transform: scaleX(1.3); }
      }
      .snake-mover-1 { animation: slideRight 10s linear infinite; }
      .snake-mover-2 { animation: slideLeft 10s linear infinite; animation-delay: -5s; }
      .glow-group { animation: glow 3s ease-in-out infinite; }
      .tongue { animation: tongueFlick 2s ease-in-out infinite; transform-origin: right center; }
      .label-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #7dcfff; }
      .sub-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #bb9af7; }
      .footer-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #565f89; }
      .contribution-grid { opacity: 0.15; }
      .snake-head-1 { fill: #7dcfff; }
      .snake-head-2 { fill: #bb9af7; }
      .snake-body-1 { fill: #63B3ED; }
      .snake-body-2 { fill: #9f7aea; }
      .eye-dot { fill: #0d0d1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="#0d0d1a"/>

  <!-- Grid pattern representing contribution graph -->
  <g class="contribution-grid">
    <rect x="50" y="80" width="700" height="140" fill="none" stroke="#2D3748" stroke-width="1"/>
    <line x1="50" y1="115" x2="750" y2="115" stroke="#2D3748" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="50" y1="150" x2="750" y2="150" stroke="#2D3748" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="50" y1="185" x2="750" y2="185" stroke="#2D3748" stroke-width="0.5" stroke-dasharray="4,4"/>
    <!-- Contribution dots -->
    <circle cx="80" cy="100" r="5" fill="#63B3ED"/>
    <circle cx="120" cy="120" r="5" fill="#63B3ED"/>
    <circle cx="160" cy="95" r="5" fill="#7dcfff"/>
    <circle cx="200" cy="140" r="5" fill="#63B3ED"/>
    <circle cx="240" cy="110" r="5" fill="#7dcfff"/>
    <circle cx="280" cy="90" r="5" fill="#bb9af7"/>
    <circle cx="320" cy="130" r="5" fill="#63B3ED"/>
    <circle cx="360" cy="105" r="5" fill="#7dcfff"/>
    <circle cx="400" cy="145" r="5" fill="#63B3ED"/>
    <circle cx="440" cy="100" r="5" fill="#bb9af7"/>
    <circle cx="480" cy="125" r="5" fill="#7dcfff"/>
    <circle cx="520" cy="95" r="5" fill="#63B3ED"/>
    <circle cx="560" cy="135" r="5" fill="#7dcfff"/>
    <circle cx="600" cy="110" r="5" fill="#63B3ED"/>
    <circle cx="640" cy="90" r="5" fill="#bb9af7"/>
    <circle cx="680" cy="140" r="5" fill="#63B3ED"/>
    <circle cx="720" cy="115" r="5" fill="#7dcfff"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="label-text" font-size="16" font-weight="bold">SNAKE EATING CONTRIBUTIONS</text>
  <text x="400" y="45" text-anchor="middle" class="sub-text" font-size="11">// one commit at a time //</text>

  <!-- Divider -->
  <line x1="50" y1="55" x2="750" y2="55" stroke="#63B3ED" stroke-width="1" opacity="0.3"/>

  <!-- SNAKE 1 - moving right -->
  <g class="snake-mover-1">
    <g class="glow-group" transform="translate(0, 100)">
      <!-- Body chain -->
      <circle cx="55" cy="70" r="18" class="snake-body-1" opacity="0.9"/>
      <circle cx="80" cy="70" r="17" class="snake-body-1" opacity="0.85"/>
      <circle cx="103" cy="70" r="16" class="snake-body-1" opacity="0.8"/>
      <circle cx="124" cy="70" r="15" class="snake-body-1" opacity="0.75"/>
      <circle cx="143" cy="70" r="14" class="snake-body-1" opacity="0.7"/>
      <circle cx="160" cy="70" r="13" class="snake-body-1" opacity="0.65"/>
      <circle cx="175" cy="70" r="12" class="snake-body-1" opacity="0.6"/>
      <circle cx="188" cy="70" r="11" class="snake-body-1" opacity="0.55"/>
      <circle cx="199" cy="70" r="10" class="snake-body-1" opacity="0.5"/>
      <circle cx="208" cy="70" r="9" class="snake-body-1" opacity="0.45"/>
      <circle cx="215" cy="70" r="8" class="snake-body-1" opacity="0.4"/>
      <circle cx="220" cy="70" r="7" class="snake-body-1" opacity="0.35"/>
      <circle cx="223" cy="70" r="6" class="snake-body-1" opacity="0.3"/>

      <!-- Head -->
      <ellipse cx="25" cy="70" rx="24" ry="22" class="snake-head-1"/>

      <!-- Eyes -->
      <circle cx="12" cy="60" r="5" class="eye-dot"/>
      <circle cx="12" cy="80" r="5" class="eye-dot"/>
      <circle cx="11" cy="59" r="2" fill="#7dcfff"/>
      <circle cx="11" cy="79" r="2" fill="#7dcfff"/>

      <!-- Tongue -->
      <g class="tongue" transform="translate(-25, 70)">
        <path d="M0,0 L-18,-5 L-12,0 L-18,5 Z" fill="#f7768e"/>
      </g>
    </g>
  </g>

  <!-- SNAKE 2 - moving left (different color) -->
  <g class="snake-mover-2">
    <g class="glow-group" transform="translate(0, 200)" style="animation-delay: 1.5s;">
      <!-- Head -->
      <ellipse cx="25" cy="50" rx="24" ry="22" class="snake-head-2"/>

      <!-- Eyes -->
      <circle cx="12" cy="40" r="5" class="eye-dot"/>
      <circle cx="12" cy="60" r="5" class="eye-dot"/>
      <circle cx="11" cy="39" r="2" fill="#bb9af7"/>
      <circle cx="11" cy="59" r="2" fill="#bb9af7"/>

      <!-- Body -->
      <circle cx="55" cy="50" r="18" class="snake-body-2" opacity="0.9"/>
      <circle cx="80" cy="50" r="17" class="snake-body-2" opacity="0.85"/>
      <circle cx="103" cy="50" r="16" class="snake-body-2" opacity="0.8"/>
      <circle cx="124" cy="50" r="15" class="snake-body-2" opacity="0.75"/>
      <circle cx="143" cy="50" r="14" class="snake-body-2" opacity="0.7"/>
      <circle cx="160" cy="50" r="13" class="snake-body-2" opacity="0.65"/>
      <circle cx="175" cy="50" r="12" class="snake-body-2" opacity="0.6"/>
      <circle cx="188" cy="50" r="11" class="snake-body-2" opacity="0.55"/>
      <circle cx="199" cy="50" r="10" class="snake-body-2" opacity="0.5"/>

      <!-- Tongue -->
      <g class="tongue" transform="translate(-25, 50)" style="animation-delay: 0.5s;">
        <path d="M0,0 L-18,-5 L-12,0 L-18,5 Z" fill="#f7768e"/>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <line x1="50" y1="255" x2="750" y2="255" stroke="#63B3ED" stroke-width="1" opacity="0.2"/>
  <text x="400" y="272" text-anchor="middle" class="footer-text">
    SKYDRAGO-DEV // CONTRIBUTING LEGENDARILY // SINCE DAY ONE
  </text>

  <!-- Border glow -->
  <rect x="10" y="5" width="780" height="270" fill="none" stroke="#63B3ED" stroke-width="2" opacity="0.2" rx="8"/>
</svg>
