name: Generate Snake Animation

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create output directory
        run: mkdir -p output

      - name: Generate snake SVG
        run: |
          cat > output/snake.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
            <defs>
              <style>
                @keyframes slide {
                  0% { transform: translateX(-60px); }
                  100% { transform: translateX(860px); }
                }
                @keyframes pulse {
                  0%, 100% { opacity: 0.4; }
                  50% { opacity: 1; }
                }
                @keyframes glow {
                  0%, 100% { filter: drop-shadow(0 0 5px #63B3ED); }
                  50% { filter: drop-shadow(0 0 15px #7dcfff); }
                }
                .snake-body {
                  fill: #63B3ED;
                  opacity: 0.9;
                }
                .snake-head {
                  fill: #7dcfff;
                  filter: drop-shadow(0 0 8px #63B3ED);
                }
                .snake-eye {
                  fill: #0d0d1a;
                }
                .grid-cell {
                  fill: #1a1b26;
                  stroke: #2D3748;
                  stroke-width: 1;
                }
                .contribution-dot {
                  fill: #63B3ED;
                  opacity: 0.6;
                }
                .snake-container {
                  animation: slide 12s linear infinite;
                }
                .title-text {
                  font-family: 'Courier New', monospace;
                  font-size: 18px;
                  fill: #7dcfff;
                  animation: pulse 2s ease-in-out infinite;
                }
                .subtitle-text {
                  font-family: 'Courier New', monospace;
                  font-size: 11px;
                  fill: #bb9af7;
                }
                .snake-group {
                  animation: glow 3s ease-in-out infinite;
                }
              </style>
              <!-- Matrix rain background pattern -->
              <pattern id="matrix-bg" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
                <rect x="0" y="0" width="30" height="30" class="grid-cell"/>
                <rect x="5" y="5" width="8" height="8" rx="2" class="contribution-dot" opacity="0.3"/>
                <rect x="17" y="17" width="8" height="8" rx="2" class="contribution-dot" opacity="0.5"/>
              </pattern>
            </defs>

            <!-- Background -->
            <rect width="800" height="300" fill="#0d0d1a"/>
            <rect width="800" height="300" fill="url(#matrix-bg)" opacity="0.5"/>

            <!-- Decorative text -->
            <text x="400" y="35" text-anchor="middle" class="title-text">🐍 THE LEGENDARY SNAKE 🐍</text>
            <text x="400" y="52" text-anchor="middle" class="subtitle-text">// eating contributions, one commit at a time //</text>

            <!-- Horizontal divider -->
            <line x1="50" y1="65" x2="750" y2="65" stroke="#63B3ED" stroke-width="1" opacity="0.3"/>

            <!-- Snake animation group -->
            <g class="snake-container">
              <g class="snake-group" transform="translate(0, 90)">
                <!-- Snake body segments (chain) -->
                <circle cx="30" cy="60" r="18" class="snake-body"/>
                <circle cx="55" cy="60" r="17" class="snake-body"/>
                <circle cx="78" cy="60" r="16" class="snake-body"/>
                <circle cx="99" cy="60" r="15" class="snake-body"/>
                <circle cx="118" cy="60" r="14" class="snake-body"/>
                <circle cx="135" cy="60" r="13" class="snake-body"/>
                <circle cx="150" cy="60" r="12" class="snake-body"/>
                <circle cx="163" cy="60" r="11" class="snake-body"/>
                <circle cx="174" cy="60" r="10" class="snake-body"/>
                <circle cx="183" cy="60" r="9" class="snake-body"/>
                <circle cx="190" cy="60" r="8" class="snake-body"/>
                <circle cx="195" cy="60" r="7" class="snake-body"/>
                <circle cx="198" cy="60" r="6" class="snake-body"/>
                <circle cx="199" cy="60" r="5" class="snake-body"/>

                <!-- Snake head -->
                <ellipse cx="0" cy="60" rx="22" ry="20" class="snake-head"/>

                <!-- Snake eyes -->
                <circle cx="-8" cy="52" r="5" class="snake-eye"/>
                <circle cx="-8" cy="68" r="5" class="snake-eye"/>
                <circle cx="-7" cy="51" r="2" fill="#7dcfff"/>
                <circle cx="-7" cy="67" r="2" fill="#7dcfff"/>

                <!-- Snake tongue -->
                <path d="M -22 60 L -35 55 L -30 60 L -35 65 Z" fill="#ff79c6"/>
              </g>
            </g>

            <!-- Second snake going opposite direction -->
            <g class="snake-container" style="animation-delay: -6s; animation-direction: reverse;">
              <g class="snake-group" transform="translate(0, 210)" style="animation-delay: 1.5s;">
                <ellipse cx="0" cy="60" rx="22" ry="20" class="snake-head" style="fill: #bb9af7;"/>
                <circle cx="-8" cy="52" r="5" class="snake-eye"/>
                <circle cx="-8" cy="68" r="5" class="snake-eye"/>
                <circle cx="-7" cy="51" r="2" fill="#bb9af7"/>
                <circle cx="-7" cy="67" r="2" fill="#bb9af7"/>
                <path d="M -22 60 L -35 55 L -30 60 L -35 65 Z" fill="#ff79c6"/>
                <circle cx="30" cy="60" r="18" style="fill: #bb9af7; opacity: 0.9;"/>
                <circle cx="55" cy="60" r="17" style="fill: #bb9af7; opacity: 0.85;"/>
                <circle cx="78" cy="60" r="16" style="fill: #bb9af7; opacity: 0.8;"/>
                <circle cx="99" cy="60" r="15" style="fill: #bb9af7; opacity: 0.75;"/>
                <circle cx="118" cy="60" r="14" style="fill: #bb9af7; opacity: 0.7;"/>
                <circle cx="135" cy="60" r="13" style="fill: #bb9af7; opacity: 0.65;"/>
                <circle cx="150" cy="60" r="12" style="fill: #bb9af7; opacity: 0.6;"/>
              </g>
            </g>

            <!-- Footer text -->
            <text x="400" y="280" text-anchor="middle" class="subtitle-text">
              ▓▒░ SKYDRAGO-DEV ░▒▓ // ▓▒░ CONTRIBUTING LEGENDARILY ░▒▓ // ▓▒░ SINCE DAY ONE ░▒▓
            </text>

            <!-- Glowing border effect -->
            <rect x="10" y="10" width="780" height="280" fill="none" stroke="#63B3ED" stroke-width="2" opacity="0.3" rx="10"/>
          </svg>
          SVGEOF

          echo "Snake SVG generated successfully!"
          cat output/snake.svg | head -20

      - name: Commit and push
        run: |
          git config user.name "SKYDRAGO DEV"
          git config user.email "skydrago@dev.com"

          git add output/snake.svg
          git commit -m "feat: update snake animation [skip ci]" || echo "No changes"
          git push origin main || echo "Branch protected"
        continue-on-error: true
