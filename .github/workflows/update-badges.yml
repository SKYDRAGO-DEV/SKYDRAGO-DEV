name: Update Dynamic Status

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate and apply dynamic status
        run: |
          STATUSES=(
            "Building distributed systems"
            "Compiling the future"
            "Deploying to prod"
            "Reviewing PR #1337"
            "Debugging the matrix"
            "Shipping features"
            "Optimizing hot paths"
            "Writing Rust at light speed"
            "Scaling to infinity"
            "Merging legends"
            "Refactoring reality"
            "Running benchmarks"
            "Shipping zero-downtime deploys"
            "Writing unittests for joy"
            "Architecting the future"
            "Merging PRs from the cosmos"
            "Fixing bugs before bugs exist"
            "Compiling dreams into binaries"
          )

          FOCUS=(
            "Rust + WebAssembly"
            "TypeScript + React"
            "Distributed Systems"
            "Cloud Architecture"
            "DevOps & SRE"
            "High-Performance APIs"
            "Go + gRPC"
            "Python + ML"
          )

          STATUS=${STATUSES[$((RANDOM % ${#STATUSES[@]}))]}
          FOCUS_ITEM=${FOCUS[$((RANDOM % ${#FOCUS[@]}))]}

          # Escape for sed
          ESCAPED_STATUS=$(echo "$STATUS" | sed 's/[\/&]/\\&/g')
          ESCAPED_FOCUS=$(echo "$FOCUS_ITEM" | sed 's/[\/&]/\\&/g')

          # Update status.json
          cat > status.json << EOF
          {
            "status": "$STATUS",
            "focus": "$FOCUS_ITEM",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          # Update README status line using marker
          if grep -q "DYNAMIC_STATUS_START" README.md; then
            # Update between markers
            sed -i "s/DYNAMIC_STATUS_START.*DYNAMIC_STATUS_END/DYNAMIC_STATUS_START ⚡ $ESCAPED_STATUS • 🎯 Focus: $ESCAPED_FOCUS DYNAMIC_STATUS_END/" README.md
          fi

          echo "Status: $STATUS"
          echo "Focus: $FOCUS_ITEM"

      - name: Commit and push
        run: |
          git config user.name "SKYDRAGO DEV"
          git config user.email "skydrago@dev.com"
          git add status.json README.md || true
          git diff --quiet || git commit -m "chore: update dynamic status [skip ci]"
          git push origin main || echo "Push skipped (no changes or protected)"
        continue-on-error: true
