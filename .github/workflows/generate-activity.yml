name: Generate Legendary Activity

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo and setup activity branch
        run: |
          git clone --bare https://github.com/SKYDRAGO-DEV/SKYDRAGO-DEV.git /tmp/activity-repo
          cd /tmp/activity-repo
          # Try to fetch activity branch, create if missing
          if git fetch origin activity:activity 2>/dev/null; then
            echo "Branch exists, will update"
          else
            echo "Creating new activity branch"
            # Create empty initial commit on new branch
            git symbolic-ref HEAD refs/heads/activity
            git commit --allow-empty -m "chore: initialize activity branch [skip ci]"
            git push origin activity 2>/dev/null || true
          fi

      - name: Checkout and commit
        run: |
          git clone https://github.com/SKYDRAGO-DEV/SKYDRAGO-DEV.git /tmp/activity-work
          cd /tmp/activity-work
          git config user.name "SKYDRAGO DEV"
          git config user.email "skydrago@dev.com"
          git checkout activity || git checkout -b activity

          COMMIT_COUNT=$((RANDOM % 4 + 1))
          echo "Generating $COMMIT_COUNT commits..."

          for i in $(seq 1 $COMMIT_COUNT); do
            DAYS_AGO=$((RANDOM % 7))
            HOURS_AGO=$((RANDOM % 24))
            DATE=$(date -d "$DAYS_AGO days ago $HOURS_AGO hours ago" -Iseconds 2>/dev/null || \
                   date -v-${DAYS_AGO}d -v-${HOURS_AGO}H -Iseconds)

            MESSAGES=(
              "feat: optimize performance in core modules"
              "fix: resolve edge case in distributed cache"
              "refactor: simplify async handler logic"
              "docs: update API documentation"
              "test: add integration tests for auth flow"
              "style: format code with latest linter rules"
              "perf: improve database query efficiency"
              "chore: update dependencies to latest versions"
              "feat: implement new caching strategy"
              "fix: handle nil pointer in edge case"
              "refactor: extract shared utilities into package"
              "feat: add support for new configuration format"
              "docs: add architecture diagram for module"
              "test: improve test coverage for critical paths"
              "perf: reduce memory allocation in hot path"
            )

            MSG=${MESSAGES[$((RANDOM % ${#MESSAGES[@]}))]}
            echo "update_$(date +%s)" >> progress.log
            git add .
            GIT_COMMITTER_DATE="$DATE" git commit --date="$DATE" -m "$MSG [skip ci]" || true
          done

          git log --oneline -3 || true

      - name: Push commits
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repository: SKYDRAGO-DEV/SKYDRAGO-DEV
          branch: activity
          force: true
          directory: /tmp/activity-work
